name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  lint-and-test:
    name: Lint and Test Backend
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: redmine_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov flake8 black isort mypy

      - name: Run Black (code formatter check)
        working-directory: ./backend
        run: black --check --diff .
        continue-on-error: true

      - name: Run isort (import sorting check)
        working-directory: ./backend
        run: isort --check-only --diff .
        continue-on-error: true

      - name: Run Flake8 (linting)
        working-directory: ./backend
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Run MyPy (type checking)
        working-directory: ./backend
        run: mypy app --ignore-missing-imports
        continue-on-error: true

      - name: Create test .env file
        working-directory: ./backend
        run: |
          echo "REDMINE_URL=https://test-redmine.com" > .env
          echo "REDMINE_API_KEY=test_key" >> .env
          echo "BOT_TOKEN=test_token" >> .env
          echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/redmine_bot_test" >> .env
          echo "HOST=0.0.0.0" >> .env
          echo "PORT=8000" >> .env
          echo "ALLOWED_API_KEYS=test:testkey123" >> .env
          echo "WEBAPP_URL=https://test.ngrok-free.app" >> .env

      - name: Run tests with pytest
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/redmine_bot_test
        run: |
          # Create test directory if it doesn't exist
          mkdir -p tests
          
          # Create a basic test file if tests don't exist
          if [ ! -f "tests/test_main.py" ]; then
            cat > tests/test_main.py << 'TESTEOF'
          import pytest
          from fastapi.testclient import TestClient
          import sys
          import os
          
          # Add parent directory to path
          sys.path.insert(0, os.path.dirname(os.path.dirname(os.path.abspath(__file__))))
          
          from main import app
          
          client = TestClient(app)
          
          def test_read_root():
              """Test root endpoint"""
              response = client.get("/")
              assert response.status_code == 200
              assert "status" in response.json()
          
          def test_health_check():
              """Test health check endpoint"""
              response = client.get("/health")
              assert response.status_code == 200
              assert response.json()["status"] == "healthy"
          
          def test_docs_accessible():
              """Test that docs are accessible"""
              response = client.get("/docs")
              assert response.status_code == 200
          TESTEOF
          fi
          
          # Run tests with coverage
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-${{ matrix.python-version }}
          fail_ci_if_error: false

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install safety
        run: pip install safety

      - name: Check for security vulnerabilities
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          safety check --json || true
        continue-on-error: true

      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r backend/app -f json -o bandit-report.json || true
        continue-on-error: true

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create Dockerfile if not exists
        working-directory: ./backend
        run: |
          if [ ! -f "Dockerfile" ]; then
            cat > Dockerfile << 'DOCKEREOF'
          FROM python:3.11-slim
          
          WORKDIR /app
          
          # Install system dependencies
          RUN apt-get update && apt-get install -y \
              postgresql-client \
              && rm -rf /var/lib/apt/lists/*
          
          # Copy requirements and install Python dependencies
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          
          # Copy application code
          COPY . .
          
          # Expose port
          EXPOSE 8000
          
          # Run the application
          CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
          DOCKEREOF
          fi

      - name: Build Docker image
        working-directory: ./backend
        run: |
          docker build -t trackdev-backend:test .

      - name: Test Docker image
        run: |
          docker run -d --name test-backend \
            -e REDMINE_URL=https://test.com \
            -e REDMINE_API_KEY=test \
            -e BOT_TOKEN=test \
            -e DATABASE_URL=postgresql://test:test@localhost/test \
            -p 8000:8000 \
            trackdev-backend:test
          sleep 5
          docker logs test-backend
          docker stop test-backend
