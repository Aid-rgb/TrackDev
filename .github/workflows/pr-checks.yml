name: Pull Request Checks

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]

jobs:
  pr-metadata:
    name: PR Metadata Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
          requireScope: false

      - name: PR size check
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const total = additions + deletions;
            
            console.log(`PR size: +${additions} -${deletions} (${total} total)`);
            
            if (total > 1000) {
              core.warning(`This PR is quite large (${total} lines). Consider splitting it into smaller PRs.`);
            }

  validate-changes:
    name: Validate Changes
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files_yaml: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            ci:
              - '.github/workflows/**'
            docker:
              - '**/Dockerfile'
              - 'docker-compose.yml'

      - name: Check if tests are needed
        if: steps.changed-files.outputs.backend_any_changed == 'true'
        run: |
          echo "Backend changes detected. Tests should be included or updated."
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "backend/tests/"; then
            echo "✅ Test changes found"
          else
            echo "::warning::Consider adding or updating tests for backend changes"
          fi

      - name: Check for breaking changes
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            
            if (body.toLowerCase().includes('breaking change')) {
              core.warning('⚠️ This PR contains BREAKING CHANGES. Ensure proper documentation and version bump.');
            }

  lint-commit-messages:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install commitlint
        run: |
          npm install -g @commitlint/cli @commitlint/config-conventional

      - name: Validate commits
        run: |
          npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose || true
        continue-on-error: true

  comment-summary:
    name: Comment PR Summary
    runs-on: ubuntu-latest
    needs: [pr-metadata, validate-changes]
    if: always()
    
    steps:
      - name: Create PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const body = `## 🤖 PR Checks Summary
            
            Thank you for your contribution! Here's a summary of automated checks:
            
            ✅ All checks completed
            
            ### Next Steps
            - Wait for CI/CD pipelines to complete
            - Address any failing checks
            - Request review from maintainers
            
            ---
            *This comment was automatically generated*`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });
