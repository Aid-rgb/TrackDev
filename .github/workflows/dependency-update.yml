name: Dependency Updates

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday
  workflow_dispatch:

jobs:
  update-dependencies:
    name: Check for Dependency Updates
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python dependencies
        working-directory: ./backend
        run: |
          pip install pip-audit
          echo "## Python Dependencies Security Audit" >> $GITHUB_STEP_SUMMARY
          pip-audit -r requirements.txt --format markdown >> $GITHUB_STEP_SUMMARY || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Check npm dependencies
        working-directory: ./frontend
        run: |
          echo "## NPM Dependencies Audit" >> $GITHUB_STEP_SUMMARY
          npm audit --json > npm-audit.json || true
          if [ -s npm-audit.json ]; then
            echo "Vulnerabilities found. Check npm-audit.json artifact." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No vulnerabilities found!" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload audit results
        uses: actions/upload-artifact@v7
        with:
          name: dependency-audit-results
          path: |
            frontend/npm-audit.json
